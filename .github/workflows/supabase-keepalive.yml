name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to prevent inactivity pause..."

          RESPONSE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" != "000" ]; then
            echo "Supabase is alive (HTTP $RESPONSE)"
          else
            echo "No response from Supabase — may be paused or unreachable"
            exit 1
          fi
